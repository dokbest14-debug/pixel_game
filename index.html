<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Pet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader-screen" class="screen">
        <div class="spinner"></div>
    </div>

    <div id="welcome-screen" class="screen hidden">
        <h1 class="fade-text">Welcome.</h1>
    </div>

    <div id="choice-screen" class="screen hidden">
        <div class="choice-container">
            <button onclick="selectPet('cat')">Котик</button>
            <button onclick="selectPet('dog')">Собачка</button>
        </div>
    </div>

    <div id="name-screen" class="screen hidden">
        <div class="input-container">
            <input type="text" id="pet-name" placeholder="Введите имя...">
            <button id="ok-btn">OK</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen hidden">
        <h2 id="pet-name-display"></h2>
        <div id="pet-sprite"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
