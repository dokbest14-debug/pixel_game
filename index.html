<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Pet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader" class="screen"><div class="spinner"></div></div>

    <div id="hello" class="screen hidden"><h1>hello.</h1></div>

    <div id="choice" class="screen hidden">
        <h2>Выбери питомца:</h2>
        <div class="pet-select">
            <button onclick="selectPet('dog')">Собака</button>
            <button onclick="selectPet('cat')">Кошка</button>
        </div>
    </div>

    <div id="naming" class="screen hidden">
        <input type="text" id="nameInput" placeholder="Имя питомца...">
        <button onclick="confirmName()">ОК</button>
    </div>

    <div id="game" class="screen hidden">
        <h1 id="petNameDisplay"></h1>
        <img id="petSprite" src="" alt="Pet">
        <div id="stats">
            <div class="stat">❤️ Здоровье: <span id="hp">100</span></div>
            <div class="stat">😊 Счастье: <span id="happy">100</span></div>
        </div>
        <div class="actions">
            <button>Кормить</button>
            <button>Играть</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
